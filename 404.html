<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<link rel="icon" href="https://blog.sunilguru.com/favicon.ico">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400&family=Noto+Sans+Oriya:wght@500&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0f1c;
color:white;
font-family:Poppins;
overflow:hidden;
text-align:center;
}

/* BACKGROUND */

#matrix,#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,247,255,0.07) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,247,255,0.07) 1px, transparent 1px);
background-size:60px 60px;
z-index:-1;
}

/* CENTER BOX */

.container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,247,255,0.4);
border-radius:20px;
padding:50px 30px;
backdrop-filter:blur(8px);
box-shadow:0 0 40px rgba(0,247,255,0.25);
max-width:420px;
width:100%;
}

/* TEXT */

h1{
font-family:Orbitron;
font-size:80px;
background:linear-gradient(90deg,#00f7ff,#8b5cf6);
-webkit-background-clip:text;
color:transparent;
}

h2{
margin-top:10px;
font-size:22px;
}

p{
margin-top:10px;
opacity:.7;
font-size:14px;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:25px;
padding:10px 22px;
border-radius:25px;
background:#00f7ff;
color:#000;
text-decoration:none;
font-weight:500;
transition:.3s;
}

.btn:hover{
box-shadow:
0 0 10px #00f7ff,
0 0 30px #00f7ff,
0 0 60px #00f7ff;
transform:scale(1.05);
}

/* ICON */

.icon{
font-size:40px;
margin-bottom:15px;
color:#00f7ff;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>
<div id="particles"></div>

<div class="container">

<div class="card">

<div class="icon">
<i class="fas fa-triangle-exclamation"></i>
</div>

<h1>404</h1>

<h2>Page Not Found</h2>

<p>The page you are looking for doesn't exist or has been moved.</p>

<a href="/" class="btn">Go Back Home</a>

</div>

</div>

<!-- MATRIX SCRIPT -->

<script>

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters="ଅଆଇଈଉଊଋଏଐଓଔକଖଗଘଙଚଛଜଝଞଟଠଡଢଣତଥଦଧନପଫବଭମଯରଲଶଷସହ";
const chars=letters.split("");

const fontSize=18;
const columns=Math.floor(canvas.width/fontSize);
const drops=new Array(columns).fill(1);

function draw(){

ctx.fillStyle="rgba(10,15,28,0.07)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00f7ff";
ctx.font=fontSize+"px Noto Sans Oriya";

for(let i=0;i<drops.length;i++){

const text=chars[Math.floor(Math.random()*chars.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;
}

}

setInterval(draw,40);

</script>

<!-- PARTICLES -->

<script>

tsParticles.load("particles",{

particles:{
number:{value:70},
color:{value:"#00f7ff"},
links:{
enable:true,
distance:140,
color:"#00f7ff",
opacity:.3
},
move:{
enable:true,
speed:1.2
},
size:{
value:{min:1,max:3}
}
}

});

</script>

</body>
</html>
